<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | TaskFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="CSS/dashboard.css">
    <link rel="stylesheet" href="CSS/responsive.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2 class="logo">TaskFlow</h2>

        <ul class="menu">
            <li><a href="dashboard.html">🏠 Dashboard</a></li>
            <li><a href="#myTasks">📋 My Tasks</a></li>
            <li><a href="calendar.html">📅 Calendar</a></li>
            <li><a href="analytics.html">📊 Analytics</a></li>
            <li><a href="settings.html">⚙ Settings</a></li>
            <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <header class="topbar">

        <input
    type="text"
    id="searchTask"
    placeholder="Search tasks..."> 

            <div class="profile">

    <span id="notificationIcon">🔔</span>

    <span id="profileIcon">👤</span>

</div>

<div id="notificationPanel" class="notification-panel">

    <h3>Notifications</h3>

    <div id="notificationList">

        <p>No notifications</p>

    </div>

</div>

        </header>

        <section class="welcome">

          <h1 id="welcomeMessage">Welcome Back 👋</h1> 

            <p>Let's make today productive.</p>

        </section>
        <section class="stats">

    <div class="card">
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p id="pendingTasks">0</p>
    </div>

</section>
   <!-- Task Section -->

<section id="myTasks" class="task-section">

    <!-- Filter Buttons -->
    <div class="filters">

        <button class="filter-btn active" onclick="filterTasks('all')">
            All
        </button>

        <button class="filter-btn" onclick="filterTasks('pending')">
            Pending
        </button>

        <button class="filter-btn" onclick="filterTasks('completed')">
            Completed
        </button>

    </div>

    <!-- Header -->
    <div class="task-header">

        <h2>My Tasks</h2>

        <button id="addTaskBtn">
            + Add Task
        </button>

    </div>

    <!-- Tasks will appear here -->
    <div id="taskContainer">

        <p>No tasks added yet.</p>

    </div>

</section>     
<!-- Add Task Modal -->

<div class="modal" id="taskModal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <h2>Add New Task</h2>

        <form id="taskForm">

            <div class="form-group">
                <label>Task Title</label>
                <input
                    type="text"
                    id="taskTitle"
                    placeholder="Enter task title"
                    required>
            </div>

            <div class="form-group">
                <label>Category</label>

                <select id="taskCategory">

                    <option>Study</option>

                    <option>Work</option>

                    <option>Personal</option>

                    <option>Fitness</option>

                </select>

            </div>

            <div class="form-group">

                <label>Priority</label>

                <select id="taskPriority">

                    <option>High</option>

                    <option>Medium</option>

                    <option>Low</option>

                </select>

            </div>

            <div class="form-group">

                <label>Due Date</label>

                <input
                    type="date"
                    id="taskDate">

            </div>

            <button
                type="submit"
                class="save-btn">

                Save Task

            </button>

        </form>

    </div>

</div>

    </main>
<script src="js/dashboard.js"></script>
</body>
</html>
