<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calendar | TaskFlow</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="css/calendar.css">

</head>


<body>


<!-- Sidebar -->

<aside class="sidebar">

<h2 class="logo">
TaskFlow
</h2>


<ul class="menu">

<li>
<a href="dashboard.html">🏠 Dashboard</a>
</li>

<li>
<a href="#">📋 My Tasks</a>
</li>

<li>
<a href="calendar.html">📅 Calendar</a>
</li>

 <li><a href="settings.html">⚙ Settings</a></li>
<li><a href="#" id="logoutBtn">🚪 Logout</a></li>


</ul>

</aside>



<!-- Main Content -->


<main class="main-content">


<header class="topbar">

<h1>
Calendar
</h1>


<div class="profile">
🔔 👤
</div>


</header>



<section class="calendar-section">


<div class="calendar-header">

<button id="prevBtn">
◀
</button>


<h2 id="monthYear">
</h2>


<button id="nextBtn">
▶
</button>


</div>



<div class="calendar">

<div class="day-name">
Sun
</div>

<div class="day-name">
Mon
</div>

<div class="day-name">
Tue
</div>

<div class="day-name">
Wed
</div>

<div class="day-name">
Thu
</div>

<div class="day-name">
Fri
</div>

<div class="day-name">
Sat
</div>


</div>



</section>



<section class="upcoming">


<h2>
Upcoming Tasks
</h2>


<div id="upcomingTasks">

<p>
No upcoming tasks
</p>


</div>


</section>



</main>


<script src="js/calendar.js"></script>


</body>
